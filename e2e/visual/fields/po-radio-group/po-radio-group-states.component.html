<div style="padding: 16px; display: flex; flex-direction: column; gap: 24px">
  <!-- State: basic -->
  <div data-testid="state-basic">
    <po-radio-group name="basic" p-label="Grupo basico" [p-options]="options"></po-radio-group>
  </div>

  <!-- State: label + helper -->
  <div data-testid="state-label-helper">
    <po-radio-group
      name="label-helper"
      p-label="Grupo com helper"
      p-helper="Texto de ajuda do helper"
      [p-options]="options"
    ></po-radio-group>
  </div>

  <!-- State: label + help-text -->
  <div data-testid="state-label-help">
    <po-radio-group
      name="label-help"
      p-label="Grupo com help"
      p-help="Texto de apoio do campo"
      [p-options]="options"
    ></po-radio-group>
  </div>

  <!-- State: disabled -->
  <div data-testid="state-disabled">
    <po-radio-group name="disabled" p-label="Grupo desabilitado" p-disabled [p-options]="options"></po-radio-group>
  </div>

  <!-- State: required -->
  <div data-testid="state-required">
    <po-radio-group
      name="required"
      p-label="Grupo obrigatorio"
      p-required
      [p-show-required]="true"
      [p-options]="options"
    ></po-radio-group>
  </div>
</div>
