<div style="padding: 16px; display: flex; flex-direction: column; gap: 24px">
  <!-- State: basic -->
  <div data-testid="state-basic">
    <po-datepicker-range name="basic" p-placeholder="Selecione um periodo"></po-datepicker-range>
  </div>

  <!-- State: label -->
  <div data-testid="state-label">
    <po-datepicker-range name="label" p-label="Label do campo" p-placeholder="Campo com label"></po-datepicker-range>
  </div>

  <!-- State: label + helper -->
  <div data-testid="state-label-helper">
    <po-datepicker-range
      name="label-helper"
      p-label="Label do campo"
      p-helper="Texto de ajuda do helper"
      p-placeholder="Campo com label e helper"
    ></po-datepicker-range>
  </div>

  <!-- State: label + help-text -->
  <div data-testid="state-label-help">
    <po-datepicker-range
      name="label-help"
      p-label="Label do campo"
      p-help="Texto de apoio do campo"
      p-placeholder="Campo com label e help"
    ></po-datepicker-range>
  </div>

  <!-- State: disabled -->
  <div data-testid="state-disabled">
    <po-datepicker-range
      name="disabled"
      p-label="Campo desabilitado"
      p-disabled
      p-placeholder="Campo desabilitado"
    ></po-datepicker-range>
  </div>

  <!-- State: required -->
  <div data-testid="state-required">
    <po-datepicker-range
      name="required"
      p-label="Campo obrigatorio"
      p-required
      p-placeholder="Campo obrigatorio"
    ></po-datepicker-range>
  </div>

  <!-- State: loading -->
  <div data-testid="state-loading">
    <po-datepicker-range name="loading" p-loading p-placeholder="Carregando..."></po-datepicker-range>
  </div>

  <!-- State: loading + label + helper -->
  <div data-testid="state-loading-label-helper">
    <po-datepicker-range
      name="loading-label-helper"
      p-label="Campo com loading, label e helper"
      p-loading
      p-helper="Texto de ajuda"
      p-placeholder="Carregando..."
    ></po-datepicker-range>
  </div>
</div>
