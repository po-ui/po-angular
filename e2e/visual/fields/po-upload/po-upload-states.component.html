<div style="padding: 16px; display: flex; flex-direction: column; gap: 24px">
  <!-- State: basic -->
  <div data-testid="state-basic">
    <po-upload name="basic" p-url="/api/upload"></po-upload>
  </div>

  <!-- State: label -->
  <div data-testid="state-label">
    <po-upload name="label" p-label="Label do campo" p-url="/api/upload"></po-upload>
  </div>

  <!-- State: label + helper -->
  <div data-testid="state-label-helper">
    <po-upload
      name="label-helper"
      p-label="Label do campo"
      p-helper="Texto de ajuda do helper"
      p-url="/api/upload"
    ></po-upload>
  </div>

  <!-- State: label + help-text -->
  <div data-testid="state-label-help">
    <po-upload
      name="label-help"
      p-label="Label do campo"
      p-help="Texto de apoio do campo"
      p-url="/api/upload"
    ></po-upload>
  </div>

  <!-- State: disabled -->
  <div data-testid="state-disabled">
    <po-upload name="disabled" p-label="Campo desabilitado" p-disabled p-url="/api/upload"></po-upload>
  </div>

  <!-- State: required -->
  <div data-testid="state-required">
    <po-upload name="required" p-label="Campo obrigatorio" p-required p-url="/api/upload"></po-upload>
  </div>
</div>
