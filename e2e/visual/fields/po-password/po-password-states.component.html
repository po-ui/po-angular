<div style="padding: 16px; display: flex; flex-direction: column; gap: 24px">
  <!-- State: basic -->
  <div data-testid="state-basic">
    <po-password name="basic" p-placeholder="Digite a senha"></po-password>
  </div>

  <!-- State: label -->
  <div data-testid="state-label">
    <po-password name="label" p-label="Label do campo" p-placeholder="Campo com label"></po-password>
  </div>

  <!-- State: label + helper -->
  <div data-testid="state-label-helper">
    <po-password
      name="label-helper"
      p-label="Label do campo"
      p-helper="Texto de ajuda do helper"
      p-placeholder="Campo com label e helper"
    ></po-password>
  </div>

  <!-- State: label + help-text -->
  <div data-testid="state-label-help">
    <po-password
      name="label-help"
      p-label="Label do campo"
      p-help="Texto de apoio do campo"
      p-placeholder="Campo com label e help"
    ></po-password>
  </div>

  <!-- State: disabled -->
  <div data-testid="state-disabled">
    <po-password name="disabled" p-label="Campo desabilitado" p-disabled p-placeholder="Campo desabilitado"></po-password>
  </div>

  <!-- State: readonly -->
  <div data-testid="state-readonly">
    <po-password
      name="readonly"
      p-label="Campo somente leitura"
      p-readonly
      p-placeholder="Campo readonly"
      [(ngModel)]="readonlyValue"
    ></po-password>
  </div>

  <!-- State: required -->
  <div data-testid="state-required">
    <po-password
      name="required"
      p-label="Campo obrigatorio"
      p-required
      [p-show-required]="true"
      p-placeholder="Campo obrigatorio"
    ></po-password>
  </div>

  <!-- State: required + errorMessage -->
  <div data-testid="state-required-error">
    <po-password
      name="required-error"
      p-label="Campo obrigatorio com erro"
      p-required
      [p-show-required]="true"
      p-error-pattern="Este campo e obrigatorio"
      [p-required-field-error-message]="true"
      p-placeholder="Campo obrigatorio com mensagem de erro"
    ></po-password>
  </div>

  <!-- State: loading -->
  <div data-testid="state-loading">
    <po-password name="loading" p-loading p-placeholder="Carregando..."></po-password>
  </div>

  <!-- State: loading + label + helper -->
  <div data-testid="state-loading-label-helper">
    <po-password
      name="loading-label-helper"
      p-label="Campo com loading, label e helper"
      p-loading
      p-helper="Texto de ajuda"
      p-placeholder="Carregando..."
    ></po-password>
  </div>
</div>
