# Nome do workflow, um repositório pode tem um ou mais workflows.
name: CI

# Define em quais situações esse workflow será executado
on:
  push:
    branches: [ master, development, '[0-9]+.x.x' ]
  pull_request:
    branches: [ master, development, '[0-9]+.x.x' ]

# Os jobs são conjuntos de actions que são executados na mesma máquina virtual.
# É possível ter mais de um job e assim executar ações paralelamente.
jobs:
  discord_notification_on_pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == false && github.event.action != 'synchronize'
    steps:
      - name: Notify Discord on PR
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"🚀 **PR Criada com Sucesso 🚀**\\n- Autor: $AUTHOR\\n- Título: $PR_TITLE\\n- Link: $PR_URL\"}" \
          $DISCORD_WEBHOOK_URL

  lint:

    runs-on: ubuntu-latest

    # As etapas do workflow são definidas nessa tag.
    steps:

    # Definição da action
    - uses: actions/checkout@v3
      # Parâmetros para a ação
      with:
        fetch-depth: 0

    - uses: wagoid/commitlint-github-action@v5

    - uses: actions/setup-node@v3
      with:
        node-version: 24

    # Executa um comando do projeto na máquina virtual
    - run: npm i
    - run: npm run format:check
    - run: npm run lint:storage
    - run: npm run lint:sync
    - run: npm run lint:ui
    - run: npm run lint:templates
    - run: npm run lint:code-editor

  build:
    name: Build packages

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 24

    - run: npm i
    - run: npm run build
    - run: npm run build:portal:docs
    - run: npm run build:portal:prod

    - uses: actions/upload-artifact@v4
      with:
        name: portal
        path: dist/portal

  test-ui:
    name: Test ui

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 24

    - run: npm i
    - run: npm run test:ui
    - run: npm run test:ui:schematics

  test-templates:
    name: Test templates

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 24

    - run: npm i
    - run: npm run build:ui:lite
    - run: npm run test:templates
    - run: npm run test:templates:schematics

  test-code-editor:
    name: Test code editor

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 24

    - run: npm i
    - run: npm run test:code-editor
    - run: npm run test:code-editor:schematics

  test-storage:
    name: Test storage

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 24

    - run: npm i
    - run: npm run build:schematics
    - run: npm run test:storage
    - run: npm run test:storage:schematics

  test-sync:
    name: Test sync

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 24

    - run: npm i
    - run: npm run build:storage:lite
    - run: npm run test:sync
    - run: npm run test:sync:schematics

  test-visual:
    name: Test visual regression

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 24

    # Cache de node_modules para evitar npm install do zero a cada execucao
    - name: Cache node_modules
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    # Cache dos browsers do Playwright para evitar download a cada execucao
    - name: Cache Playwright browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    # Detecta o nome da branch atual
    - name: Get branch name
      id: branch
      env:
        HEAD_REF: ${{ github.head_ref }}
        REF_NAME: ${{ github.ref_name }}
        EVENT_NAME: ${{ github.event_name }}
      run: |
        if [ "$EVENT_NAME" = "pull_request" ]; then
          BRANCH_NAME="$HEAD_REF"
        else
          BRANCH_NAME="$REF_NAME"
        fi
        echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
        echo "Branch name: $BRANCH_NAME"

    # Verifica se existe uma branch de mesmo nome no po-style
    - name: Check for matching po-style branch
      id: po_style
      env:
        BRANCH_NAME: ${{ steps.branch.outputs.name }}
      run: |
        ENCODED_BRANCH=$(echo "$BRANCH_NAME" | sed 's|/|%2F|g')
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          "https://api.github.com/repos/po-ui/po-style/branches/$ENCODED_BRANCH")
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "found=true" >> $GITHUB_OUTPUT
          echo "Branch '$BRANCH_NAME' encontrada no po-style"
        else
          echo "found=false" >> $GITHUB_OUTPUT
          echo "Branch '$BRANCH_NAME' nao encontrada no po-style (HTTP $HTTP_STATUS), usando @po-ui/style do npm"
        fi

    # Se encontrou a branch, clona po-style, builda e gera o tgz
    - name: Build po-style from matching branch
      if: steps.po_style.outputs.found == 'true'
      env:
        BRANCH_NAME: ${{ steps.branch.outputs.name }}
      run: |
        git clone --branch "$BRANCH_NAME" --depth 1 https://github.com/po-ui/po-style.git /tmp/po-style
        cd /tmp/po-style
        npm ci
        npm run build
        npm run pack:style
        echo "TGZ gerado:"
        ls -la dist/style/*.tgz

    # Instala dependencias do po-angular (skip se cache hit)
    - name: Install dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      run: npm i

    # Se tiver o tgz do po-style, instala por cima da versao do npm
    - name: Install po-style from tgz
      if: steps.po_style.outputs.found == 'true'
      run: |
        TGZ_PATH=$(ls /tmp/po-style/dist/style/*.tgz)
        echo "Instalando @po-ui/style a partir de: $TGZ_PATH"
        npm install "$TGZ_PATH"

    - run: npm run build:ui:lite

    # Instala browsers do Playwright (skip se cache hit)
    - name: Install Playwright browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium

    # Restaura baselines do cache (geradas em execucoes anteriores no CI)
    - name: Restore visual regression baselines from cache
      id: baselines-cache
      uses: actions/cache@v4
      with:
        path: e2e/visual/__snapshots__
        key: visual-baselines-${{ runner.os }}-${{ hashFiles('e2e/visual/**/*.visual.spec.ts', 'e2e/visual/**/*.component.html') }}
        restore-keys: |
          visual-baselines-${{ runner.os }}-

    # Se nao encontrou baselines no cache, gera novas para o ambiente CI
    - name: Generate baselines for CI environment
      if: steps.baselines-cache.outputs.cache-hit != 'true'
      run: npx playwright test --update-snapshots=missing --reporter=list

    # Executa os testes visuais comparando com as baselines
    - name: Run visual regression tests
      run: npx playwright test

    # Disponibiliza o relatorio HTML do Playwright como artefato
    - name: Upload visual regression report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: visual-regression-report
        path: e2e/visual/playwright-report/
        retention-days: 15

    # Disponibiliza os resultados de teste (diffs, screenshots) como artefato
    - name: Upload visual regression test results
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: visual-regression-test-results
        path: e2e/visual/test-results/
        retention-days: 15
