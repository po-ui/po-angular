<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>PO Elements - Demonstracao Web Components</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
      color: #333;
    }
    /* Corrige exibicao do calendario do datepicker no contexto Web Component.
       O Angular define display:none via inline style em ngAfterViewInit, mas o
       togglePicker nao consegue remove-lo corretamente com OnPush + Custom Element.
       Quando [hidden] e removido (visible=true), forcamos a exibicao via CSS. */
    po-datepicker .po-datepicker-popup-calendar:not([hidden]) {
      display: block !important;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    h2 {
      font-size: 1.15rem;
      margin-top: 32px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid #753399;
      color: #753399;
    }
    .subtitle {
      color: #666;
      margin-bottom: 24px;
    }
    .demo-section {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .demo-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .demo-field {
      min-width: 280px;
      max-width: 400px;
      flex: 1;
    }
    pre#log {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 16px;
      border-radius: 8px;
      font-size: 13px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .badge {
      display: inline-block;
      background: #753399;
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <h1>PO Elements <span class="badge">Web Components PoC</span></h1>
  <p class="subtitle">
    Componentes PO UI renderizados como Web Components (Custom Elements) em uma pagina HTML pura, sem Angular.
  </p>

  <!-- ==================== po-button ==================== -->
  <h2>po-button</h2>
  <div class="demo-section">
    <div class="demo-row">
      <po-button p-label="Primary" p-kind="primary"></po-button>
      <po-button p-label="Secondary" p-kind="secondary"></po-button>
      <po-button p-label="Tertiary" p-kind="tertiary"></po-button>
      <po-button p-label="Danger" p-kind="primary" p-danger></po-button>
      <po-button p-label="Disabled" p-kind="primary" p-disabled></po-button>
      <po-button p-label="Com icone" p-kind="secondary" p-icon="an an-search"></po-button>
    </div>
  </div>

  <!-- ==================== po-input ==================== -->
  <h2>po-input</h2>
  <div class="demo-section">
    <div class="demo-row">
      <div class="demo-field">
        <po-input id="input-nome" p-label="Nome completo" p-placeholder="Digite seu nome" p-help="Campo obrigatorio" p-helper="Informe seu nome completo conforme documento de identificacao." additional-help-event-trigger="" p-required></po-input>
      </div>
      <div class="demo-field">
        <po-input id="input-email" p-label="Email" p-placeholder="usuario@empresa.com" p-icon="an an-envelope" p-helper="Utilize um email corporativo valido para receber as notificacoes." additional-help-event-trigger=""></po-input>
      </div>
    </div>
  </div>

  <!-- ==================== po-datepicker ==================== -->
  <h2>po-datepicker</h2>
  <div class="demo-section">
    <div class="demo-row">
      <div class="demo-field">
        <po-datepicker id="datepicker-nascimento" p-label="Data de nascimento" p-placeholder="dd/mm/aaaa" p-helper="Selecione a data no formato dia/mes/ano." additional-help-event-trigger=""></po-datepicker>
      </div>
      <div class="demo-field">
        <po-datepicker p-label="Data desabilitada" p-placeholder="dd/mm/aaaa" p-disabled></po-datepicker>
      </div>
    </div>
  </div>

  <!-- ==================== po-combo ==================== -->
  <h2>po-combo</h2>
  <div class="demo-section">
    <div class="demo-row">
      <div class="demo-field">
        <po-combo id="combo-estados" p-label="Estado" p-placeholder="Selecione um estado"></po-combo>
      </div>
    </div>
  </div>

  <!-- ==================== po-lookup ==================== -->
  <h2>po-lookup</h2>
  <div class="demo-section">
    <div class="demo-row">
      <div class="demo-field">
        <po-lookup id="lookup-cidade" p-label="Cidade" p-placeholder="Pesquise uma cidade" p-field-label="nome" p-field-value="id"></po-lookup>
      </div>
    </div>
  </div>

  <!-- ==================== Log de eventos ==================== -->
  <h2>Log de Eventos</h2>
  <div class="demo-section">
    <pre id="log">[aguardando eventos dos Web Components...]</pre>
  </div>

  <script>
    var logEl = document.getElementById('log');
    var logCount = 0;
    function logEvent(source, eventName, detail) {
      logCount++;
      var timestamp = new Date().toLocaleTimeString('pt-BR');
      var detailStr = detail !== undefined && detail !== null ? ' => ' + JSON.stringify(detail) : '';
      logEl.textContent = '[' + timestamp + '] ' + source + '.' + eventName + detailStr + '\n' + logEl.textContent;
      if (logCount === 1) {
        logEl.textContent = logEl.textContent.replace('[aguardando eventos dos Web Components...]\n', '');
      }
    }

    /**
     * Aguarda os Custom Elements serem definidos antes de configurar propriedades.
     * Propriedades complexas (objetos, arrays) nao podem ser passadas via atributos HTML,
     * precisam ser configuradas via JavaScript apos o registro do Custom Element.
     */
    function waitForElements(selectors) {
      return Promise.all(selectors.map(function(s) {
        return customElements.whenDefined(s);
      }));
    }

    waitForElements(['po-input', 'po-datepicker', 'po-combo', 'po-lookup', 'po-button']).then(function() {
      // === Configuracao do po-combo ===
      var comboEstados = document.getElementById('combo-estados');
      if (comboEstados) {
        comboEstados.options = [
          { label: 'Sao Paulo', value: 'SP' },
          { label: 'Rio de Janeiro', value: 'RJ' },
          { label: 'Minas Gerais', value: 'MG' },
          { label: 'Bahia', value: 'BA' },
          { label: 'Parana', value: 'PR' },
          { label: 'Rio Grande do Sul', value: 'RS' },
          { label: 'Santa Catarina', value: 'SC' },
          { label: 'Goias', value: 'GO' }
        ];
      }

      // === Configuracao do po-lookup ===
      // O lookup exige um servico (service) e colunas (columns) para permitir
      // a abertura da modal de busca. No contexto Web Component, propriedades
      // complexas (objetos/arrays) precisam ser configuradas diretamente na
      // instancia do componente Angular via ng.getComponent(), pois a atribuicao
      // via elemento['p-columns'] nao propaga corretamente para o componente interno.
      setTimeout(function() {
        var lookupCidade = document.getElementById('lookup-cidade');
        if (lookupCidade && typeof ng !== 'undefined') {
          var lookupComp = ng.getComponent(lookupCidade);
          if (lookupComp) {
            lookupComp.columns = [
              { property: 'id', label: 'Codigo', type: 'number' },
              { property: 'nome', label: 'Cidade' },
              { property: 'uf', label: 'UF' }
            ];

            // Servico mock que implementa a interface PoLookupFilter.
            // Retorna dados estaticos para demonstrar a abertura da modal.
            var cidadesMock = [
              { id: 1, nome: 'Sao Paulo', uf: 'SP' },
              { id: 2, nome: 'Rio de Janeiro', uf: 'RJ' },
              { id: 3, nome: 'Belo Horizonte', uf: 'MG' },
              { id: 4, nome: 'Salvador', uf: 'BA' },
              { id: 5, nome: 'Curitiba', uf: 'PR' },
              { id: 6, nome: 'Porto Alegre', uf: 'RS' },
              { id: 7, nome: 'Florianopolis', uf: 'SC' },
              { id: 8, nome: 'Goiania', uf: 'GO' },
              { id: 9, nome: 'Brasilia', uf: 'DF' },
              { id: 10, nome: 'Recife', uf: 'PE' }
            ];

            // Mock service usando Observable-like (compativel com rxjs subscribe)
            lookupComp.service = {
              getFilteredItems: function(params) {
                var filter = (params.filter || '').toLowerCase();
                var filtered = cidadesMock.filter(function(c) {
                  return c.nome.toLowerCase().indexOf(filter) !== -1 ||
                         c.uf.toLowerCase().indexOf(filter) !== -1;
                });
                return {
                  subscribe: function(observer) {
                    var result = { items: filtered, hasNext: false };
                    if (typeof observer === 'function') {
                      observer(result);
                    } else if (observer && typeof observer.next === 'function') {
                      observer.next(result);
                      if (typeof observer.complete === 'function') {
                        observer.complete();
                      }
                    }
                    return { unsubscribe: function() {} };
                  },
                  pipe: function() { return this; }
                };
              },
              getObjectByValue: function(value) {
                var found = cidadesMock.find(function(c) { return c.id === Number(value); });
                return {
                  subscribe: function(observer) {
                    if (typeof observer === 'function') {
                      observer(found || {});
                    } else if (observer && typeof observer.next === 'function') {
                      observer.next(found || {});
                      if (typeof observer.complete === 'function') {
                        observer.complete();
                      }
                    }
                    return { unsubscribe: function() {} };
                  },
                  pipe: function() { return this; }
                };
              }
            };
          }
        }
      }, 500);

      // === Registro de eventos ===
      document.querySelectorAll('po-button').forEach(function(btn, i) {
        btn.addEventListener('p-click', function(e) {
          logEvent('po-button[' + i + ']', 'p-click', btn.getAttribute('p-label'));
        });
      });

      document.querySelectorAll('po-input').forEach(function(inp, i) {
        inp.addEventListener('p-change', function(e) {
          logEvent('po-input[' + i + ']', 'p-change', e.detail);
        });
      });

      if (comboEstados) {
        comboEstados.addEventListener('p-change', function(e) {
          logEvent('po-combo', 'p-change', e.detail);
        });
      }

      document.querySelectorAll('po-datepicker').forEach(function(dp, i) {
        dp.addEventListener('p-change', function(e) {
          logEvent('po-datepicker[' + i + ']', 'p-change', e.detail);
        });
      });

      var lookupEl = document.getElementById('lookup-cidade');
      if (lookupEl) {
        lookupEl.addEventListener('p-change', function(e) {
          logEvent('po-lookup', 'p-change', e.detail);
        });
      }
    });
  </script>

</body>
</html>
