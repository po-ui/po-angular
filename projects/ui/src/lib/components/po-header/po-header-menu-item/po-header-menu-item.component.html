<style></style>

@if (overflowButton) {
  <li
    #buttonMoreElement
    #overflowButton
    class="po-header-nav-submenu-more"
    tabindex="0"
    (click)="openListButtonMore()"
    (keydown)="onKeyDownButtonMore($event)"
  >
    <div class="po-header-nav-submenu-button-more" [class.open]="poPopupElement?.showPopup">
      <span>More</span>
      <po-icon
        class="po-nav-icon po-header-nav-submenu-more-icon"
        [p-icon]="poPopupElement?.showPopup ? 'ICON_ARROW_UP' : 'ICON_ARROW_DOWN'"
      ></po-icon>
    </div>
  </li>
} @else {
  <li
    #menusubmenuitem
    tabindex="0"
    [p-tooltip]="item?.label"
    class="po-header-nav-submenu"
    (click)="onAction(item)"
    (keydown)="onKeyDownButtonList($event, item)"
  >
    <div class="po-header-nav-submenu-button" [class.submenu-item-selected]="item?.$selected">
      <span>{{ item?.label }}</span>
    </div>
  </li>
}

@if (overflowButton) {
  <po-popup
    #popup
    [p-actions]="itemOverFlow"
    [p-target]="buttonMoreElement"
    [p-hide-arrow]="true"
    (p-click-item)="onAction($event)"
  >
  </po-popup>
}
