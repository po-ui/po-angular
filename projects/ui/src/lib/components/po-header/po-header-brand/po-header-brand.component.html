<div class="po-header-nav-brand">
  @if (externalMenu) {
    <po-button #target class="po-nav-header-medium" p-icon="an an-list" p-kind="tertiary" (p-click)="clickMenu.emit()">
    </po-button>
  } @else if (menuCollapse.length && !hideButtonMenu) {
    <po-button #target p-icon="an an-list" p-kind="tertiary" (p-click)="clickMenu.emit()"> </po-button>
  }

  @if (brand?.logo) {
    <div class="po-header-nav-brand-logo" (click)="brand?.action?.()">
      <img [src]="brand.logo" alt="Logo" />
    </div>
  }
  <span #titleBrand [p-tooltip]="showTooltip ? brand?.title : ''" class="po-header-nav-brand-text">{{
    brand?.title
  }}</span>
</div>
