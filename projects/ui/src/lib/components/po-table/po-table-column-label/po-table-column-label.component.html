@if (checkValueHasLabel()) {
  <po-tag
    [p-color]="$safeNavigationMigration(value?.color)"
    [p-value]="$safeNavigationMigration(value?.label)"
    [p-text-color]="$safeNavigationMigration(value?.textColor)"
    [p-icon]="$safeNavigationMigration(value?.icon)"
    [p-type]="$safeNavigationMigration(value?.type)"
  >
  </po-tag>
}
