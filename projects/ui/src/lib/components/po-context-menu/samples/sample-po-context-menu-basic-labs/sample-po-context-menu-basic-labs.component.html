<po-context-menu
  [p-context-title]="contextTitle"
  [p-title]="title"
  [p-items]="menuItems"
  [(p-expanded)]="expanded"
  (p-item-selected)="onItemSelected($event)"
>
</po-context-menu>

<po-divider></po-divider>

<form #f="ngForm">
  <div class="po-row">
    <po-input class="po-md-6" name="contextTitle" [(ngModel)]="contextTitle" p-label="Context Title" p-clean>
    </po-input>

    <po-input class="po-md-6" name="title" [(ngModel)]="title" p-label="Title" p-clean> </po-input>
  </div>

  <div class="po-row">
    <po-switch
      class="po-md-6"
      name="expanded"
      [(ngModel)]="expanded"
      p-label="Expanded"
      p-label-off="Collapsed"
      p-label-on="Expanded"
    >
    </po-switch>
  </div>

  <po-divider></po-divider>

  <div class="po-row">
    <po-input class="po-md-6" name="newItemLabel" [(ngModel)]="newItemLabel" p-label="New Item Label"> </po-input>

    <po-button class="po-md-3" p-label="Add Item" (p-click)="addItem()"> </po-button>
  </div>

  <div class="po-row">
    <po-button class="po-md-3" p-label="Sample Restore" (p-click)="restore()"> </po-button>
  </div>
</form>
