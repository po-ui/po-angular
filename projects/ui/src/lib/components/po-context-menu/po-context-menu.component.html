<div class="po-context-menu" [class.po-context-menu-collapsed]="!expanded()">
  <div class="po-context-menu-header">
    <button
      class="po-context-menu-toggle"
      type="button"
      [attr.aria-label]="expanded() ? literals.close : literals.open"
      (click)="toggleExpand()"
    >
      <po-icon [p-icon]="expanded() ? 'ICON_SIDEBAR' : 'ICON_SIDEBAR_SIMPLES'" />
    </button>

    @if (expanded()) {
      <div class="po-context-menu-header-content">
        @if (contextTitle()) {
          <span
            #contextTitleRef
            class="po-context-menu-context-title"
            (mouseenter)="handlerContextTitleTooltip(contextTitleRef)"
            p-tooltip-position="right"
            [p-tooltip]="contextTitleTooltip()"
          >
            {{ contextTitle() }}
          </span>
        }
        @if (title()) {
          <span
            #titleRef
            class="po-context-menu-title"
            (mouseenter)="handlerTitleTooltip(titleRef)"
            p-tooltip-position="right"
            [p-tooltip]="titleTooltip()"
          >
            {{ title() }}
          </span>
        }
      </div>
    }
  </div>

  @if (expanded()) {
    <nav class="po-context-menu-body">
      <ul class="po-context-menu-list" role="menu">
        @for (item of _items(); track $index) {
          <li
            #itemRef
            class="po-context-menu-list-item"
            role="menuitem"
            tabindex="0"
            [attr.aria-label]="item.label"
            [class.po-context-menu-item-selected]="item.selected"
            (click)="selectItem(item)"
            (keydown.enter)="selectItem(item)"
            (keydown.space)="selectItem(item)"
            (mouseenter)="handlerItemTooltip(item, itemRef)"
            p-tooltip-position="right"
            [p-tooltip]="item.tooltip"
          >
            <span class="po-context-menu-item-label">{{ item.label }}</span>
          </li>
        }
      </ul>
    </nav>
  }
</div>
