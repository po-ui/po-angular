<div class="po-field-container">
  <div class="po-field-container-title">
    @if (label || help) {
      <div class="po-label-wrapper" [attr.title]="label">
        <po-label
          [p-disabled]="disabled"
          p-field="true"
          [p-for]="id"
          [p-label]="label"
          [p-requirement]="requirement"
        ></po-label>
      </div>
      <div class="po-label-helper">
        <po-helper p-helper="isso é um teste"></po-helper>
      </div>
    }
  </div>

  @if (help) {
    <div class="po-field-help">{{ help }}</div>
  }

  <ng-content></ng-content>
</div>
