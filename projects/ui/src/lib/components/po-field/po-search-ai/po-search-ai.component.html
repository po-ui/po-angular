@let poHelper = setHelper(label, additionalHelpTooltip);
<po-field-container
  #fieldContainer
  [p-disabled]="isDisabled"
  [p-id]="id"
  [p-label]="label"
  [p-optional]="optional"
  [p-required]="required"
  [p-show-required]="showRequired"
  [p-helper]="label ? poHelper.helperSettings : undefined"
  [p-show-helper]="label ? displayAdditionalHelp : undefined"
  [p-size]="size"
  [p-text-wrap]="labelTextWrap()"
  [p-compact-label]="compactLabel()"
>
  <div class="po-field-container-content">
    <div class="po-field-container-content-helper-wrapper">
      <div class="po-field-container-input">
        <input
          #inp
          class="po-input"
          [attr.aria-label]="label || placeholder"
          [attr.name]="name"
          [attr.data-focused-element]="!isDisabled"
          [attr.data-inactive-component]="isDisabled || readonly"
          [attr.p-size]="size"
          [autocomplete]="autocomplete"
          [class.po-input-icon-right]="true"
          [disabled]="isDisabled"
          [id]="id"
          [placeholder]="isDisabled ? '' : placeholder"
          [readonly]="readonly"
          [required]="required"
          [type]="type"
          (blur)="eventOnBlur($event)"
          (focus)="eventOnFocus($event)"
          (input)="eventOnInput($event)"
          (keydown)="onSearchKeydown($event)"
        />

        @if (loading) {
          <po-loading-icon [p-size]="mapSizeToIcon(size)"></po-loading-icon>
        } @else {
          <div class="po-field-icon-container-right">
            @if (clean && !isDisabled && !readonly) {
              <po-clean
                class="po-icon-input"
                [p-element-ref]="inputEl"
                [p-size]="size"
                (p-change-event)="clearSearch()"
              >
              </po-clean>
              <div class="po-button-vertical-divider"></div>
            }
            <po-button
              #iconSearchAi
              class="po-search-ai-button"
              p-icon="an an-magic-wand"
              p-kind="tertiary"
              [p-disabled]="isDisabled || readonly"
              [p-size]="size"
              (p-click)="search()"
            >
            </po-button>
          </div>
        }
      </div>
      @if ((!this.label && poHelperComponent()) || (!this.label && poHelper.hideAdditionalHelp)) {
        <po-helper
          #helperEl
          class="po-field-helper-button"
          [p-size]="size"
          [p-helper]="poHelper.helperSettings"
          [p-disabled]="isDisabled"
          [p-append-in-body]="appendBox"
        >
        </po-helper>
      }
    </div>
  </div>

  @if (!readonly) {
    <po-field-container-bottom
      [p-append-in-body]="appendBox"
      [p-help]="help"
      [p-disabled]="isDisabled"
      [p-error-pattern]="getErrorPattern()"
      [p-error-limit]="errorLimit"
      [p-size]="size"
    ></po-field-container-bottom>
  }
</po-field-container>
