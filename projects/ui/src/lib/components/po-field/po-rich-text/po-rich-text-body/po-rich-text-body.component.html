<div class="po-field-container-rich-text-body">
  <div
    #bodyElement
    class="po-rich-text-body"
    [class.has-value]="hasValue"
    [class.has-scroll]="hasScroll"
    [class.has-loading]="loading"
    [class.po-rich-text-disabled]="disabled"
    [tabindex]="disabled ? -1 : 0"
    [attr.aria-label]="label"
    [attr.contenteditable]="!readonly && !disabled"
    [attr.data-placeholder]="placeholder"
    [style.height.px]="height"
    (blur)="onBlur()"
    (click)="onClick()"
    (cut)="update()"
    (focus)="onFocus()"
    (keydown)="onKeyDown($event)"
    (keyup)="onKeyUp($event)"
    (paste)="onPaste()"
  ></div>
  @if (loading) {
    <div class="po-field-icon-container-right po-rich-text-loading-container">
      <po-loading-icon [p-size]="mapSizeToIcon(size)"></po-loading-icon>
    </div>
  }
</div>
