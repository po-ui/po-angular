<po-ai-search
  name="aiSearch"
  p-label="Busca inteligente"
  p-help="Descreva o que procura em linguagem natural e pressione Enter"
  p-placeholder="Ex: clientes de SP com idade acima de 30"
  p-url="http://localhost:3333/api/ai/filter"
  [p-columns]="columns"
  (p-result)="onResult($event)"
  (p-clear)="onClear()"
>
</po-ai-search>

@if (lastFilter) {
  <p class="po-mt-1">
    <strong>Filtro gerado:</strong> {{ lastFilter }}
  </p>
}
