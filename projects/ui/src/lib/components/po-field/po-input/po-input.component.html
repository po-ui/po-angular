<po-field-container
  [p-disabled]="disabled"
  [p-id]="id"
  [p-label]="label"
  [p-optional]="optional"
  [p-required]="required"
  [p-show-required]="showRequired"
>
  <div class="po-field-container-content">
    @if (icon) {
      <div class="po-field-icon-container-left">
        <po-icon
          class="po-field-icon {{ disabled ? 'po-icon-input-disabled' : 'po-icon-input' }}"
          [class.po-field-icon-disabled]="disabled"
          [class.po-field-icon-aa]="size === 'small'"
          [p-icon]="icon"
        ></po-icon>
      </div>
    }

    <input
      #inp
      class="po-input"
      [attr.name]="name"
      [autocomplete]="autocomplete"
      [class.po-input-icon-left]="icon"
      [class.po-input-icon-left-aa]="icon && size === 'small'"
      [class.po-input-icon-right]="clean"
      [class.po-input-icon-right-aa]="clean && size === 'small'"
      [class.po-input-aa]="size === 'small'"
      [disabled]="disabled"
      [id]="id"
      [placeholder]="disabled ? '' : placeholder"
      [readonly]="readonly"
      [required]="required"
      [type]="type"
      (blur)="eventOnBlur($event)"
      (click)="eventOnClick($event)"
      (focus)="eventOnFocus($event)"
      (input)="eventOnInput($event)"
      (keydown)="onKeyDown($event)"
    />

    <div class="po-field-icon-container-right">
      @if (clean && !disabled && !readonly) {
        <po-clean
          class="{{ disabled ? 'po-icon-input-disabled' : 'po-icon-input' }}"
          [p-element-ref]="inputEl"
          [p-size]="size"
          (p-change-event)="clear($event)"
        >
        </po-clean>
      }
    </div>
  </div>

  @if (!readonly) {
    <po-field-container-bottom
      [p-append-in-body]="appendBox"
      [p-help]="help"
      [p-disabled]="disabled"
      [p-error-pattern]="getErrorPattern()"
      [p-error-limit]="errorLimit"
      [p-additional-help-tooltip]="!label && additionalHelpTooltip ? getAdditionalHelpTooltip() : null"
      [p-show-additional-help]="!label && additionalHelpTooltip ? displayAdditionalHelp : null"
      [p-show-additional-help-icon]="!label && additionalHelpTooltip ? showAdditionalHelpIcon() : null"
      (p-additional-help)="!label && additionalHelpTooltip ? emitAdditionalHelp() : null"
    ></po-field-container-bottom>
  }
</po-field-container>
