<div class="po-timer-wrapper">
  <div class="po-timer">
    <!-- Coluna de Horas -->
    <div class="po-timer-column" role="listbox" [attr.aria-label]="literals.hours">
      <span class="po-timer-column-label">{{ literals.hours }}</span>
      @for (hour of hours; track hour; let i = $index) {
        <button
          #hourCell
          class="po-timer-cell"
          type="button"
          role="option"
          [class.po-timer-cell-selected]="selectedHour === hour"
          [class.po-timer-cell-disabled]="isHourDisabled(hour)"
          [attr.aria-selected]="selectedHour === hour"
          [attr.aria-disabled]="isHourDisabled(hour)"
          [attr.tabindex]="isHourDisabled(hour) ? -1 : 0"
          (click)="onSelectHour(hour)"
          (keydown)="onCellKeydown($event, 'hour', i)"
        >
          {{ formatValue(hour) }}
        </button>
      }
    </div>

    <!-- Separador Horas/Minutos -->
    <div class="po-timer-column-separator" aria-hidden="true">:</div>

    <!-- Coluna de Minutos -->
    <div class="po-timer-column" role="listbox" [attr.aria-label]="literals.minutes">
      <span class="po-timer-column-label">{{ literals.minutes }}</span>
      @for (minute of minutes; track minute; let i = $index) {
        <button
          #minuteCell
          class="po-timer-cell"
          type="button"
          role="option"
          [class.po-timer-cell-selected]="selectedMinute === minute"
          [class.po-timer-cell-disabled]="isMinuteDisabled(minute)"
          [attr.aria-selected]="selectedMinute === minute"
          [attr.aria-disabled]="isMinuteDisabled(minute)"
          [attr.tabindex]="isMinuteDisabled(minute) ? -1 : 0"
          (click)="onSelectMinute(minute)"
          (keydown)="onCellKeydown($event, 'minute', i)"
        >
          {{ formatValue(minute) }}
        </button>
      }
    </div>

    <!-- Separador Minutos/Segundos (condicional) -->
    @if (showSeconds) {
      <div class="po-timer-column-separator" aria-hidden="true">:</div>

      <!-- Coluna de Segundos -->
      <div class="po-timer-column" role="listbox" [attr.aria-label]="literals.seconds">
        <span class="po-timer-column-label">{{ literals.seconds }}</span>
        @for (second of seconds; track second; let i = $index) {
          <button
            #secondCell
            class="po-timer-cell"
            type="button"
            role="option"
            [class.po-timer-cell-selected]="selectedSecond === second"
            [class.po-timer-cell-disabled]="isSecondDisabled(second)"
            [attr.aria-selected]="selectedSecond === second"
            [attr.aria-disabled]="isSecondDisabled(second)"
            [attr.tabindex]="isSecondDisabled(second) ? -1 : 0"
            (click)="onSelectSecond(second)"
            (keydown)="onCellKeydown($event, 'second', i)"
          >
            {{ formatValue(second) }}
          </button>
        }
      </div>
    }

    <!-- Toggle AM/PM (formato 12h) -->
    @if (is12HourFormat) {
      <div class="po-timer-period-toggle" role="radiogroup" aria-label="AM/PM">
        <button
          class="po-timer-period-button"
          type="button"
          role="radio"
          [class.po-timer-period-button-selected]="period === 'AM'"
          [attr.aria-checked]="period === 'AM'"
          (click)="onSelectPeriod('AM')"
        >
          AM
        </button>
        <button
          class="po-timer-period-button"
          type="button"
          role="radio"
          [class.po-timer-period-button-selected]="period === 'PM'"
          [attr.aria-checked]="period === 'PM'"
          (click)="onSelectPeriod('PM')"
        >
          PM
        </button>
      </div>
    }
  </div>
</div>
