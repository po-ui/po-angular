@if (isRange) {
  <div class="po-calendar" [class.po-calendar-with-presets]="effectivePresets.length > 0">
    @if (effectivePresets.length > 0) {
      <po-calendar-preset-list
        [p-presets]="effectivePresets"
        [p-locale]="locale"
        [p-selected-preset]="selectedPresetLabel"
        [p-size]="size"
        (p-select-preset)="onPresetSelected($event)"
        (p-close-calendar)="onCloseCalendar()"
      ></po-calendar-preset-list>
    }
    <ng-container *ngTemplateOutlet="calendarWrapper; context: { partType: 'start' }"></ng-container>
  </div>
} @else {
  <div class="po-calendar">
    <ng-container *ngTemplateOutlet="calendarWrapper; context: { partType: 'single' }"></ng-container>
  </div>
}

<ng-template #calendarWrapper let-partType="partType">
  <po-calendar-wrapper
    [p-value]="getValue(partType)"
    [p-activate-date]="getActivateDate(partType)"
    [p-locale]="locale"
    [p-min-date]="minDate"
    [p-max-date]="maxDate"
    [p-part-type]="partType"
    [p-range]="isRange"
    [p-responsive]="isResponsive"
    [p-selected-value]="value"
    [p-hover-value]="hoverValue"
    [p-hide-today-button]="effectivePresets.length > 0"
    (p-header-change)="onHeaderChange($event, partType)"
    (p-select-date)="onSelectDate($event, partType)"
    (p-hover-date)="onHoverDate($event)"
    (p-close-calendar)="onCloseCalendar()"
    [p-header-template]="headerTemplate"
    [p-size]="size"
  >
  </po-calendar-wrapper>
</ng-template>
