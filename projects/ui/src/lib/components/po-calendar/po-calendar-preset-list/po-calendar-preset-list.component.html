<div class="po-calendar-preset-list" role="listbox">
  @for (preset of presets; track preset.label; let i = $index) {
    <po-button
      class="po-calendar-preset-item"
      [class.po-calendar-preset-item-selected]="isSelected(preset)"
      p-kind="tertiary"
      [p-size]="size"
      role="option"
      [attr.aria-selected]="isSelected(preset)"
      [attr.tabindex]="getTabIndex(i)"
      (click)="onPresetClick(preset)"
      (keydown)="onKeydown($event, i)"
      [p-label]="getDisplayLabel(preset)"
    >
    </po-button>
  }
</div>
