<div
  class="po-widget-container"
  [class.po-clickable]="click.observers.length"
  [class.po-widget]="!primary"
  [class.po-widget-disabled]="disabled"
  [class.po-widget-primary]="primary"
  [class.po-widget-no-shadow]="click.observers.length && noShadow"
  [style.background-image]="background ? 'url(' + background + ')' : undefined"
  (click)="onClick($event)"
  (keydown)="onKeyDown($event)"
  [tabindex]="disabled || !click.observers.length ? -1 : 0"
>
  <div *ngIf="hasTitleHelpOrSetting()" class="po-widget-header">
    <div class="po-widget-wrapper-info">
      <div #wrapperInfo class="po-widget-wrapper-tag">
        @if (showTitleAction) {
          <span
            #wrapperTitle
            class="po-widget-title-action"
            (click)="runTitleAction($event)"
            class="po-widget-text"
            [p-tooltip]="title && showTooltip() ? title : ''"
          >
            {{ title }}
          </span>
        } @else {
          <p #wrapperTitle class="po-widget-text" [p-tooltip]="title && showTooltip() ? title : ''">
            {{ title }}
          </p>
        }

        <po-tag
          *ngIf="tagLabel"
          [p-value]="tagLabel"
          [p-icon]="tagIcon"
          [p-type]="disabled ? null : tagType ? tagType : 'success'"
          [p-color]="disabled ? '#ECECEE' : null"
          [p-text-color]="disabled ? '#36364A' : null"
          p-force-icon
        >
        </po-tag>
      </div>

      <div *ngIf="actions?.length" class="po-widget-button-wrapper" #popupTarget (click)="togglePopup(popupTarget)">
        <po-button
          #buttonPopUp
          [p-size]="small ? 'small' : ''"
          p-icon="an-fill an-dots-three-outline-vertical"
          [p-disabled]="disabled"
          p-kind="tertiary"
        >
        </po-button>
      </div>
    </div>
  </div>

  <po-container p-no-padding p-no-border [p-height]="containerHeight">
    <div class="po-widget-body" [class.po-widget-container-space-top]="hasTitleHelpOrSetting()">
      <ng-content></ng-content>
    </div>
  </po-container>

  <div *ngIf="primaryLabel" class="po-widget-footer po-widget-container-space-top">
    <ng-container *ngIf="!secondaryLabel">
      <po-button
        class="po-widget-actions"
        id="primaryAct-{{ id }}"
        [p-label]="primaryLabel"
        (p-click)="runPrimaryAction()"
        [p-danger]="dangerPrimaryAction"
        [p-kind]="primary ? 'primary' : kindPrimaryAction || 'tertiary'"
        [p-disabled]="disabled"
        [p-size]="small ? 'small' : ''"
      ></po-button>
    </ng-container>

    <ng-container *ngIf="secondaryLabel">
      <po-button
        class="po-widget-actions"
        id="primaryAct-{{ id }}"
        [p-label]="primaryLabel"
        (p-click)="runPrimaryAction()"
        [p-danger]="dangerPrimaryAction"
        [p-kind]="primary ? 'primary' : kindPrimaryAction || 'tertiary'"
        [p-disabled]="disabled"
        [p-size]="small ? 'small' : ''"
      ></po-button>
    </ng-container>
    <ng-container *ngIf="secondaryLabel">
      <po-button
        class="po-widget-actions"
        id="secondaryAct-{{ id }}"
        [p-label]="secondaryLabel"
        (p-click)="runSecondaryAction()"
        [p-danger]="dangerSecondaryAction"
        [p-kind]="primary ? 'primary' : kindPrimaryAction || 'tertiary'"
        [p-disabled]="disabled"
        [p-size]="small ? 'small' : ''"
      ></po-button>
    </ng-container>
  </div>
</div>

<po-popup #popup [p-actions]="actions" [p-target]="popupTarget" (p-close)="closePopUp()"> </po-popup>
