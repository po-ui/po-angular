<div class="po-row">
  <po-widget class="po-md-6" p-height="380" p-title="Latest Article">
    <div class="article-card">
      <!-- Article thumbnail -->
      <po-skeleton p-variant="rectangle" p-height="150px" p-loading-label="Carregando artigo"></po-skeleton>

      <!-- Article title -->
      <po-skeleton p-variant="text" p-loading-label=""></po-skeleton>
      <po-skeleton p-variant="text" p-width="90%" p-loading-label=""></po-skeleton>

      <!-- Author info -->
      <div class="article-author">
        <po-skeleton p-variant="circle" p-size="sm" p-loading-label=""></po-skeleton>
        <div class="author-details">
          <po-skeleton p-variant="text" p-width="100px" p-size="sm" p-loading-label=""></po-skeleton>
          <po-skeleton p-variant="text" p-width="80px" p-size="sm" p-loading-label=""></po-skeleton>
        </div>
      </div>

      <!-- Article excerpt -->
      <po-skeleton p-variant="text" p-loading-label=""></po-skeleton>
      <po-skeleton p-variant="text" p-loading-label=""></po-skeleton>
      <po-skeleton p-variant="text" p-width="75%" p-loading-label=""></po-skeleton>

      <!-- Read more -->
      <po-skeleton p-variant="text" p-width="80px" p-loading-label=""></po-skeleton>
    </div>
  </po-widget>
</div>
