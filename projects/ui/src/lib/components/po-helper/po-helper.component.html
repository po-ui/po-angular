<div class="po-helper-container">
  <span
    #target
    class="po-helper-target"
    tabindex="0"
    role="button"
    aria-label="Ajuda"
    (keydown.space)="onSpace($event)"
  >
    <po-icon p-icon="ICON_HELP"></po-icon>
  </span>
  <po-popover
    #popover
    p-position="right-bottom"
    [p-target]="target"
    [p-title]="typeof helper() === 'string' ? '' : helper()?.title"
    [p-trigger]="typeof helper() === 'string' ? 'click' : helper()?.popoverTrigger || 'click'"
  >
    {{ typeof helper() === 'string' ? helper() : helper()?.content }}
    @if (typeof helper() !== 'string' && helper()?.footerAction) {
      <po-divider></po-divider>
      <po-link (p-action)="helper().footerAction.action()" [p-label]="helper().footerAction.label"> </po-link>
    }
  </po-popover>
</div>
