<po-page-default p-title="Teste: Performance / Flickering">
  <div class="po-row po-mb-2">
    <div class="po-md-12">
      <strong>FPS:</strong> <span #fpsDisplay>{{ fps }}</span>
      <span class="po-ml-3">|</span>
      <span class="po-ml-3"><strong>Thead Y:</strong> {{ theadPositionY }}</span>
      <span class="po-ml-3">|</span>
      <span class="po-ml-3"><strong>Itens:</strong> {{ items.length }}</span>
      <span class="po-ml-3">|</span>
      <span class="po-ml-3"><strong>Auto-scroll:</strong> {{ autoScrolling ? 'Ativo' : 'Inativo' }}</span>
    </div>
  </div>

  <div class="po-row po-mb-2">
    <po-button class="po-mr-2" p-label="Iniciar FPS Counter" (p-click)="startFpsCounter()"></po-button>
    <po-button class="po-mr-2" p-label="Parar FPS Counter" (p-click)="stopFpsCounter()"></po-button>
    <po-button class="po-mr-2" [p-label]="autoScrolling ? 'Parar Auto-scroll' : 'Iniciar Auto-scroll'" (p-click)="toggleAutoScroll()"></po-button>
  </div>

  <div class="po-row">
    <po-table
      class="po-sm-12"
      [p-items]="items"
      [p-columns]="columns"
      [p-virtual-scroll]="true"
      [p-height]="height"
      [p-striped]="true"
    >
    </po-table>
  </div>
</po-page-default>
