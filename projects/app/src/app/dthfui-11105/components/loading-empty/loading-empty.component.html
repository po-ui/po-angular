<po-page-default p-title="Teste: Loading e Estado Vazio">
  <div class="po-row po-mb-2">
    <div class="po-md-12">
      <strong>Estado:</strong> {{ currentState }}
      <span class="po-ml-3">|</span>
      <span class="po-ml-3"><strong>Itens:</strong> {{ items.length }}</span>
      <span class="po-ml-3">|</span>
      <span class="po-ml-3"><strong>Loading:</strong> {{ loading }}</span>
    </div>
  </div>

  <div class="po-row po-mb-2">
    <po-button class="po-mr-2" [p-label]="loading ? 'Desativar Loading' : 'Ativar Loading'" (p-click)="toggleLoading()"></po-button>
    <po-button class="po-mr-2" p-label="Limpar Itens" (p-click)="clearItems()"></po-button>
    <po-button class="po-mr-2" p-label="Popular (5000 itens)" (p-click)="populateItems()"></po-button>
    <po-button class="po-mr-2" p-label="Simular Ciclo (load -> populate)" (p-click)="simulateLoadCycle()"></po-button>
  </div>

  <div class="po-row">
    <po-table
      class="po-sm-12"
      [p-items]="items"
      [p-columns]="columns"
      [p-virtual-scroll]="true"
      [p-height]="height"
      [p-loading]="loading"
      [p-striped]="true"
    >
    </po-table>
  </div>
</po-page-default>
