<po-page-default p-title="Teste: Ordenação com Virtual Scroll">
  <div class="po-row po-mb-2">
    <div class="po-md-12">
      <strong>Itens:</strong> {{ items.length }}
      <span class="po-ml-3">|</span>
      <span class="po-ml-3"><strong>Última ordenação:</strong> {{ lastSortColumn }} ({{ lastSortType }})</span>
    </div>
  </div>

  <div class="po-row">
    <po-table
      class="po-sm-12"
      [p-items]="items"
      [p-columns]="columns"
      [p-virtual-scroll]="true"
      [p-height]="height"
      [p-sort]="true"
      [p-striped]="true"
      (p-sort-by)="onSortBy($event)"
    >
    </po-table>
  </div>
</po-page-default>
