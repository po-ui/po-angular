<div class="hero">
  <div class="hero-bg">
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>
    <div class="hero-orb hero-orb-3"></div>
    <div class="hero-grid"></div>
  </div>

  <div class="hero-content">
    <div class="hero-badge">
      <span class="hero-badge-dot"></span>
      Open Source &middot; Angular &middot; Typescript
    </div>

    <h1 class="hero-title">
      <span class="hero-title-line">Construa interfaces</span>
      <span class="hero-title-accent">extraordin&aacute;rias</span>
    </h1>

    <p class="hero-subtitle">
      Biblioteca de componentes Angular de alta performance, acess&iacute;vel e responsiva.
      Nascida na TOTVS, feita para o mundo.
    </p>

    <div class="hero-actions">
      <po-button
        p-kind="primary"
        p-label="Come&ccedil;ar agora"
        p-icon="an an-rocket-launch"
        (p-click)="openInternalLink('guides/getting-started')"
      ></po-button>
      <po-button
        p-label="GitHub"
        p-icon="an an-github-logo"
        (p-click)="openExternalLink('https://github.com/po-ui/po-angular')"
      ></po-button>
    </div>

    <div class="hero-stats">
      <div class="hero-stat" *ngIf="stargazers_count">
        <span class="hero-stat-value">{{ stargazers_count | number }}</span>
        <span class="hero-stat-label">Stars</span>
      </div>
      <div class="hero-stat">
        <span class="hero-stat-value">80+</span>
        <span class="hero-stat-label">Componentes</span>
      </div>
      <div class="hero-stat">
        <span class="hero-stat-value">MIT</span>
        <span class="hero-stat-label">Licen&ccedil;a</span>
      </div>
    </div>
  </div>

  <div class="hero-scroll-indicator">
    <div class="hero-scroll-line"></div>
  </div>
</div>
